<style>
  :root {
    --bg:#1f1a14; --panel:#2a241c; --ink:#f5e8c8; --ink-dim:#c8b487;
    --accent:#d8a85a; --rule:#5a4226;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink);
                font-family: Georgia, "Times New Roman", serif; }
  #app { display:flex; height:100vh; }
  #map-wrap { flex:1; position:relative; overflow:hidden; background:#1f1a14; }
  #map-wrap svg { width:100%; height:100%; display:block; cursor:grab; user-select:none; }
  #map-wrap svg.dragging { cursor:grabbing; }
  #side { width:380px; background:var(--panel); border-left:2px solid var(--rule);
           padding:18px 18px 26px; overflow-y:auto; }
  #side h1 { font-size:28px; margin:0 0 4px; color:var(--accent); letter-spacing:2px;}
  #side .sub { color:var(--ink-dim); font-style:italic; margin-bottom:14px; font-size:14px;}
  #side h2 { font-size:20px; margin:18px 0 6px; color:var(--accent); border-bottom:1px solid var(--rule); padding-bottom:4px;}
  #side h3 { font-size:16px; margin:10px 0 4px; color:var(--ink);}
  #side p { margin:0 0 8px; line-height:1.45;}
  #side .blurb { color:var(--ink-dim);}
  #search { width:100%; padding:8px 10px; background:#1a1610; color:var(--ink);
             border:1px solid var(--rule); border-radius:3px; font-family:inherit; font-size:14px;}
  .poi-list { list-style:none; padding:0; margin:8px 0;}
  .poi-list li { padding:6px 8px; margin:2px 0; background:#1a1610; border-left:3px solid var(--rule);
                  cursor:pointer; transition:.15s;}
  .poi-list li:hover { background:#2c241a; border-left-color:var(--accent);}
  .poi-list .npc { color:var(--ink-dim); font-style:italic; font-size:12px;}
  .badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:11px;
            background:#3a2c18; color:var(--ink-dim); margin-right:4px;}
  #toolbar { position:absolute; top:14px; right:14px; background:rgba(42,36,28,0.92);
              border:1px solid var(--rule); border-radius:4px; padding:6px;
              display:flex; gap:6px; z-index:10;}
  #toolbar button { background:#1a1610; color:var(--ink); border:1px solid var(--rule);
                     border-radius:3px; padding:6px 10px; cursor:pointer; font-family:inherit;
                     font-size:13px;}
  #toolbar button:hover { background:#2c241a; border-color:var(--accent);}
  #tooltip { position:absolute; pointer-events:none; background:rgba(42,36,28,0.96);
              border:1px solid var(--accent); border-radius:3px; padding:6px 10px;
              color:var(--ink); font-size:13px; max-width:300px; line-height:1.35;
              z-index:20; display:none; box-shadow: 0 3px 12px rgba(0,0,0,0.6);}
  #tooltip .t-name { color:var(--accent); font-weight:bold; margin-bottom:2px;}
  #tooltip .t-npc { color:var(--ink-dim); font-style:italic; font-size:11px;}
  .poi:hover circle:nth-of-type(1) { fill:#ffd56a; }
  .district { transition: filter 0.2s; }
  .district.dim { filter: brightness(0.55); }
  .poi.dim { opacity: 0.25; }
  .footer { margin-top: 24px; color:var(--ink-dim); font-size:11px; text-align:center;
             border-top:1px solid var(--rule); padding-top:10px;}
</style>
</head>

<polygon class="district" id="d-rotgut" points="220,1090 470,1080 490,1540 220,1545" fill="#5F5660" stroke="#3A3338" stroke-width="3" data-name="Rotgut Row" data-blurb="Saltside&#x27;s southern underbelly. Tighter alleys, fewer lanterns, the deals get worse the further in you go." data-tone="Vice and shadow. Watch your purse."/>
<polygon class="district" id="d-thornwall" points="470,290 1620,290 1620,650 1200,650 1150,700 1150,1095 470,1095" fill="#D4B488" stroke="#8E6B3A" stroke-width="3" data-name="Thornwall" data-blurb="The commercial heart of Bastion — the great market ring wrapping the Citadel&#x27;s north and west. Wide cobbled streets, awnings in red and gold, the Notice Board at the center." data-tone="Prosperous, busy, the place every traveler ends up."/>
<polygon class="district" id="d-castle" points="1200,650 1570,650 1620,700 1620,1045 1570,1095 1200,1095 1150,1045 1150,700" fill="#F2EDDC" stroke="#5C5650" stroke-width="3" data-name="Citadel District" data-blurb="Bastion&#x27;s walled heart on the highest ground at the city&#x27;s very center. The Sunspire Cathedral and the Petalguard Keep crown it; along the inner ring stand the Hall of Records and the almshouses and healing-houses that are the city&#x27;s visible mercy. Power, piety, and charity side by side." data-tone="Imposing. Power and dread — and the machinery of charity. Visible from anywhere in the city."/>
<polygon class="district" id="d-crest" points="1620,290 2210,290 2230,900 2160,1095 1620,1095" fill="#EDE0C2" stroke="#A88E4A" stroke-width="3" data-name="Crest" data-blurb="Wealthy. Ironwork gates, manicured gardens, arched windows. The streets climb west, up the hill toward the Citadel." data-tone="Old money. Quiet, cool, slightly disdainful."/>
<polygon class="district" id="d-hearthside" points="1300,1095 2160,1095 2120,1540 1300,1540" fill="#E8D8B0" stroke="#9B8454" stroke-width="3" data-name="Hearthside" data-blurb="Quiet residential streets in the Citadel&#x27;s southern shadow. Two-story homes, small gardens, curving lanes that grew naturally rather than by design." data-tone="Warm. The kind of street where neighbors know your name."/>

<script>
const POI_DATA = {"anchor_sq": {"name": "Anchor Square", "npc": "", "tooltip": "Open cobblestone plaza just inside the Harbor Gate. Notice Board at center.", "services": "Public notice board, customs check, frequent crier announcements.", "district": "saltside", "cat": "notice"}, "harlow": {"name": "Harlow's Chandlery", "npc": "Maren Harlow", "tooltip": "Ship supplies; knows every captain that puts in.", "services": "Rope, lamp oil, sailcloth, pitch, ship's biscuit. Free local rumors with purchase.", "district": "saltside", "cat": "chandler"}, "salted_keel": {"name": "The Salted Keel", "npc": "Big Tomas", "tooltip": "Tavern. Dockworkers, gossip, watered ale.", "services": "Beer 1c. Bowl of stew 3c. Bunk in the back 1s.", "district": "saltside", "cat": "tavern"}, "pell_fish": {"name": "Pell's Fish Market", "npc": "Pell", "tooltip": "Open-air stalls. Fishmonger and waterfront intel.", "services": "Daily catch. Pell hears everything spoken on a pier.", "district": "saltside", "cat": "fish"}, "rusty_hook": {"name": "The Rusty Hook", "npc": "Casta Vane", "tooltip": "Info broker. Basement fighting pit. Discreet rooms.", "services": "Information 5\u201350 Nectar. Side-bets on the pit. No questions about the basement.", "district": "rotgut", "cat": "gambling"}, "silken_lantern": {"name": "Silken Lantern", "npc": "Madame Orla", "tooltip": "Brothel. Trades in favors as often as coin.", "services": "Companionship; secrets; debts owed in either direction.", "district": "rotgut", "cat": "luxury"}, "dregs": {"name": "The Dregs", "npc": "Wicket", "tooltip": "Black-market alchemist. No receipts. No questions.", "services": "Anything you couldn't buy at the Verdant Flask. Double the price.", "district": "rotgut", "cat": "alchemy"}, "bare_knuckle": {"name": "Bare Knuckle Row", "npc": "", "tooltip": "Dead-end alley with three small fight venues.", "services": "Cash bouts. House cut 20%. No magic, no weapons.", "district": "rotgut", "cat": "gambling"}, "thornwall_sq": {"name": "Thornwall Square", "npc": "", "tooltip": "Central market. Iron thorn-pattern fence. The City Notice Board.", "services": "Permanent stalls; daily criers; the Notice Board (job postings, bounties, reports of the missing).", "district": "thornwall", "cat": "notice"}, "brannick": {"name": "Brannick's Arms", "npc": "Hal Brannick", "tooltip": "Weaponsmith. Fair prices, good steel.", "services": "Common weapons at PHB price. Custom commissions take 1d4 days.", "district": "thornwall", "cat": "weapon"}, "ironhide": {"name": "Ironhide Outfitters", "npc": "Dessa Ironhide (Bestial \u2014 bear)", "tooltip": "Armorsmith. Bestial bear-folk; quiet, exacting.", "services": "Armor at PHB price. Repairs same-day. Will refuse jobs from anyone she doesn't like.", "district": "thornwall", "cat": "armor"}, "verdant_flask": {"name": "The Verdant Flask", "npc": "Aldric Moss", "tooltip": "Apothecary. Legitimate potions only.", "services": "Healing potions, antitoxin, basic alchemy. Will report unusual orders.", "district": "thornwall", "cat": "alchemy"}, "crossed_keys": {"name": "The Crossed Keys Inn", "npc": "Jorik & Maren Tallow", "tooltip": "Two-story inn. Retired adventurers; the best beds in Thornwall.", "services": "Room 8s/night. Hot meal 3s. Will hold messages and packages free of charge.", "district": "thornwall", "cat": "inn"}, "thorn_thread": {"name": "Thorn & Thread", "npc": "Syl (Faelari)", "tooltip": "Tailor. Faelari. Doesn't talk about home.", "services": "Custom garments, repairs, dyeing. Excellent work; cold demeanor.", "district": "thornwall", "cat": "tailor"}, "ashmore": {"name": "Ashmore's Curios", "npc": "Prof. Emery Ashmore", "tooltip": "Maps, oddities, eccentric scholar. Will talk your ear off.", "services": "Regional maps 5\u201350g. Trinkets. Free lecture with purchase.", "district": "thornwall", "cat": "scholar"}, "millstone": {"name": "Millstone Bakery", "npc": "Bren Millstone", "tooltip": "Best bread in Bastion. Quietly charitable.", "services": "Loaves 2c. Day-old bread free to those who ask politely.", "district": "hearthside", "cat": "bakery"}, "chapel_green": {"name": "Chapel of the Green", "npc": "Sister Wynn", "tooltip": "Open-air shrine. Healer, counselor, warm fire.", "services": "Free first aid. Donations welcomed. Will not turn anyone away.", "district": "hearthside", "cat": "temple"}, "ketter": {"name": "Ketter's Boarding House", "npc": "Old Ketter", "tooltip": "Cheap long-term lodging. Rooms by the week.", "services": "Bed 4s/week. Three meals 1g/week. No questions.", "district": "hearthside", "cat": "inn"}, "velvet_stone": {"name": "Velvet & Stone", "npc": "Lucien Ashford", "tooltip": "High-end tailor and jeweler. Insufferable. Excellent.", "services": "Bespoke garments 50g+. Jewelry by commission. Will name-drop relentlessly.", "district": "crest", "cat": "luxury"}, "gilded_rest": {"name": "The Gilded Rest", "npc": "Castellan Dore", "tooltip": "Finest inn in Bastion outside the castle.", "services": "Suite 5g/night. Private dining. The kind of place deals get made.", "district": "crest", "cat": "inn"}, "warden_hall": {"name": "Warden's Hall", "npc": "Capt. Lorna Vetch", "tooltip": "City Watch HQ. Capt. Vetch is honest \u2014 a possible ally.", "services": "File reports. Request escort. Bounties posted weekly.", "district": "crest", "cat": "guard"}, "ashvale_garden": {"name": "Ashvale Memorial Garden", "npc": "Bessa", "tooltip": "Manicured garden. Bessa tends it; she served the Ashvales of Withered Manor.", "services": "Open dawn\u2013dusk. Bessa knows old Ashvale secrets if you earn her trust.", "district": "crest", "cat": "garden"}, "dented_shield": {"name": "The Dented Shield", "npc": "Gorran", "tooltip": "Wilt tavern and social hub near the South Gate. Gorran knows who's gone missing.", "services": "Beer 1c. Stew 2c. Gorran keeps a list of names no one else writes down.", "district": "wilt", "cat": "tavern"}, "mara_mending": {"name": "Mara's Mending", "npc": "Mara", "tooltip": "Half-blind seamstress. Excellent repairs.", "services": "Patch & repair clothing/armor 5\u201320c. Half-price for the desperate.", "district": "wilt", "cat": "tailor"}, "shelter_w": {"name": "The Shelter", "npc": "", "tooltip": "Unmarked refuge run by the Chapel of the Green \u2014 a hot meal and a dry floor, no charge.", "services": "Last-resort beds for those who can't afford the Wilt's cheapest rooms; Sister Wynn's network, funded by quiet Hearthside donors.", "district": "wilt", "cat": "shelter"}, "labor_wall": {"name": "Day Labor Wall", "npc": "", "tooltip": "A stone wall near the South Gate where employers post the day's work notices. Crowded before dawn; empty by mid-morning.", "services": "Unskilled labor 1\u20133 Nectar/day. Where new arrivals end up if luck doesn't break.", "district": "wilt", "cat": "labor"}, "storm_drain": {"name": "South Gate Storm Drain", "npc": "", "tooltip": "A canonical Undergrowth entry \u2014 a grate that drops into the tunnels and on toward the deep cisterns.", "services": "Not a destination: a way down for those who know the grates.", "district": "wilt", "cat": "drain"}, "main_keep": {"name": "The Petalguard Keep", "npc": "The King", "tooltip": "Seat of the King, at the city's center and highest ground. White stone, four corner towers within the citadel wall.", "services": "Audiences by appointment. The Petalguard control all access.", "district": "castle", "cat": "castle"}, "garrison": {"name": "Petalguard Garrison", "npc": "", "tooltip": "Petalguard HQ. Heavily staffed; barracks and armory.", "services": "Petalguard command. Unaffiliated visitors not welcomed.", "district": "castle", "cat": "guard"}, "admin": {"name": "Administration Hall", "npc": "", "tooltip": "Civil records, tax office, royal proclamations.", "services": "Permits, deeds, formal complaints (slow).", "district": "castle", "cat": "guard"}, "sunspire": {"name": "Sunspire Cathedral", "npc": "", "tooltip": "The city's spiritual heart. A white spire visible from every district; the poor are never turned from its doors.", "services": "Daily services. Sanctuary and blessing \u2014 the public face of Bastion's faith.", "district": "castle", "cat": "cathedral"}, "hall_records": {"name": "The Hall of Records", "npc": "", "tooltip": "Bastion's archive of births, deaths, deeds, and decrees \u2014 dusty, quiet, and revealing.", "services": "Public records (slow). A patient researcher learns who owns what and who owes whom.", "district": "castle", "cat": "records"}, "almshouses": {"name": "Almshouses & Healing-Houses", "npc": "", "tooltip": "Shelters, hospitals, and foundling homes along the inner ring \u2014 Bastion's visible compassion.", "services": "Illuminated menders heal regardless of pay; beds for the destitute. The city's proof of its own virtue.", "district": "castle", "cat": "shelter"}};
const DISTRICT_DATA = {"saltside": {"name": "Saltside", "blurb": "Working waterfront. Salt-stained planks, gulls, the smell of fish and tar.", "tone": "Functional, weather-beaten, never quiet.", "pois": ["anchor_sq", "harlow", "salted_keel", "pell_fish"]}, "rotgut": {"name": "Rotgut Row", "blurb": "Saltside's southern underbelly. Tighter alleys, fewer lanterns, the deals get worse the further in you go.", "tone": "Vice and shadow. Watch your purse.", "pois": ["rusty_hook", "silken_lantern", "dregs", "bare_knuckle"]}, "thornwall": {"name": "Thornwall", "blurb": "The commercial heart of Bastion \u2014 the great market ring wrapping the Citadel's north and west. Wide cobbled streets, awnings in red and gold, the Notice Board at the center.", "tone": "Prosperous, busy, the place every traveler ends up.", "pois": ["thornwall_sq", "brannick", "ironhide", "verdant_flask", "crossed_keys", "thorn_thread", "ashmore"]}, "castle": {"name": "Citadel District", "blurb": "Bastion's walled heart on the highest ground at the city's very center. The Sunspire Cathedral and the Petalguard Keep crown it; along the inner ring stand the Hall of Records and the almshouses and healing-houses that are the city's visible mercy. Power, piety, and charity side by side.", "tone": "Imposing. Power and dread \u2014 and the machinery of charity. Visible from anywhere in the city.", "pois": ["main_keep", "garrison", "admin", "sunspire", "hall_records", "almshouses"]}, "crest": {"name": "Crest", "blurb": "Wealthy. Ironwork gates, manicured gardens, arched windows. The streets climb west, up the hill toward the Citadel.", "tone": "Old money. Quiet, cool, slightly disdainful.", "pois": ["velvet_stone", "gilded_rest", "warden_hall", "ashvale_garden"]}, "hearthside": {"name": "Hearthside", "blurb": "Quiet residential streets in the Citadel's southern shadow. Two-story homes, small gardens, curving lanes that grew naturally rather than by design.", "tone": "Warm. The kind of street where neighbors know your name.", "pois": ["millstone", "chapel_green", "ketter"]}, "wilt": {"name": "The Wilt", "blurb": "Poor but swept clean. Day laborers, mended clothes, the Day Labor Wall crowded before dawn.", "tone": "Tired but holding on. The streets stay swept because someone insists they do.", "pois": ["dented_shield", "mara_mending", "shelter_w", "labor_wall", "storm_drain"]}};
const NPC_INDEX = [{"npc": "Maren Harlow", "loc": "Harlow's Chandlery", "id": "harlow"}, {"npc": "Big Tomas", "loc": "The Salted Keel", "id": "salted_keel"}, {"npc": "Pell", "loc": "Pell's Fish Market", "id": "pell_fish"}, {"npc": "Casta Vane", "loc": "The Rusty Hook", "id": "rusty_hook"}, {"npc": "Madame Orla", "loc": "Silken Lantern", "id": "silken_lantern"}, {"npc": "Wicket", "loc": "The Dregs", "id": "dregs"}, {"npc": "Hal Brannick", "loc": "Brannick's Arms", "id": "brannick"}, {"npc": "Dessa Ironhide (Bestial \u2014 bear)", "loc": "Ironhide Outfitters", "id": "ironhide"}, {"npc": "Aldric Moss", "loc": "The Verdant Flask", "id": "verdant_flask"}, {"npc": "Jorik & Maren Tallow", "loc": "The Crossed Keys Inn", "id": "crossed_keys"}, {"npc": "Syl (Faelari)", "loc": "Thorn & Thread", "id": "thorn_thread"}, {"npc": "Prof. Emery Ashmore", "loc": "Ashmore's Curios", "id": "ashmore"}, {"npc": "Bren Millstone", "loc": "Millstone Bakery", "id": "millstone"}, {"npc": "Sister Wynn", "loc": "Chapel of the Green", "id": "chapel_green"}, {"npc": "Old Ketter", "loc": "Ketter's Boarding House", "id": "ketter"}, {"npc": "Lucien Ashford", "loc": "Velvet & Stone", "id": "velvet_stone"}, {"npc": "Castellan Dore", "loc": "The Gilded Rest", "id": "gilded_rest"}, {"npc": "Capt. Lorna Vetch", "loc": "Warden's Hall", "id": "warden_hall"}, {"npc": "Bessa", "loc": "Ashvale Memorial Garden", "id": "ashvale_garden"}, {"npc": "Gorran", "loc": "The Dented Shield", "id": "dented_shield"}, {"npc": "Mara", "loc": "Mara's Mending", "id": "mara_mending"}, {"npc": "The King", "loc": "The Petalguard Keep", "id": "main_keep"}];

const svg = document.querySelector("#map-wrap svg");
const tooltip = document.getElementById("tooltip");
const sidePanel = document.getElementById("default-panel");
const detailPanel = document.getElementById("detail-panel");
const detailContent = document.getElementById("detail-content");

// ---- Tooltip ----
svg.addEventListener("mousemove", (e) => {
  const t = e.target.closest(".poi, .district");
  if (!t) { tooltip.style.display = "none"; return; }
  let html = "";
  if (t.classList.contains("poi")) {
    const id = t.dataset.id;
    const d = POI_DATA[id];
    html = `<div class="t-name">${d.name}</div>` +
           (d.npc ? `<div class="t-npc">${d.npc}</div>` : "") +
           `<div>${d.tooltip}</div>`;
  } else {
    html = `<div class="t-name">${t.dataset.name}</div>` +
           `<div>${t.dataset.blurb}</div>` +
           `<div class="t-npc">${t.dataset.tone}</div>`;
  }
  tooltip.innerHTML = html;
  const rect = document.getElementById("map-wrap").getBoundingClientRect();
  tooltip.style.display = "block";
  let tx = e.clientX - rect.left + 16;
  let ty = e.clientY - rect.top + 16;
  if (tx + 320 > rect.width) tx = e.clientX - rect.left - 320;
  if (ty + 200 > rect.height) ty = e.clientY - rect.top - 200;
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
});
svg.addEventListener("mouseleave", () => tooltip.style.display = "none");

// ---- Click → side panel ----
svg.addEventListener("click", (e) => {
  const poi = e.target.closest(".poi");
  if (poi) { showPOI(poi.dataset.id); return; }
  const dist = e.target.closest(".district");
  if (dist) showDistrict(dist.id.replace("d-", ""));
});

function showDistrict(did) {
  const d = DISTRICT_DATA[did];
  if (!d) return;
  detailContent.innerHTML = `
    <h2>${d.name}</h2>
    <p class="blurb"><em>${d.tone}</em></p>
    <p>${d.blurb}</p>
    <h3>Notable Locations</h3>
    <ul class="poi-list">
      ${d.pois.map(id => {
        const p = POI_DATA[id];
        return `<li onclick="showPOI('${id}')">${p.name}${p.npc ? `<br><span class="npc">${p.npc}</span>` : ""}</li>`;
      }).join("")}
    </ul>`;
  sidePanel.style.display = "none";
  detailPanel.style.display = "block";
  highlightDistrict(did);
}

function showPOI(id) {
  const p = POI_DATA[id];
  if (!p) return;
  detailContent.innerHTML = `
    <h2>${p.name}</h2>
    ${p.npc ? `<p><span class="badge">${p.cat}</span><strong>${p.npc}</strong></p>` : `<p><span class="badge">${p.cat}</span></p>`}
    <p class="blurb">${p.tooltip}</p>
    <h3>Services / Notes</h3>
    <p>${p.services || "—"}</p>
    <p style="font-size:12px;color:var(--ink-dim);">District: <a href="#" onclick="event.preventDefault();showDistrict('${p.district}')">${DISTRICT_DATA[p.district].name}</a></p>`;
  sidePanel.style.display = "none";
  detailPanel.style.display = "block";
  highlightPOI(id);
}

function highlightDistrict(did) {
  document.querySelectorAll(".district").forEach(el => {
    el.classList.toggle("dim", el.id !== "d-" + did);
  });
  document.querySelectorAll(".poi").forEach(el => {
    el.classList.toggle("dim", el.dataset.district !== did);
  });
}
function highlightPOI(id) {
  document.querySelectorAll(".district").forEach(el => el.classList.remove("dim"));
  document.querySelectorAll(".poi").forEach(el => {
    el.classList.toggle("dim", el.dataset.id !== id);
  });
}
function clearHighlight() {
  document.querySelectorAll(".district,.poi").forEach(el => el.classList.remove("dim"));
}

document.getElementById("back").onclick = () => {
  sidePanel.style.display = "block";
  detailPanel.style.display = "none";
  clearHighlight();
};

// ---- District list in default panel ----
const dlist = document.getElementById("district-list");
Object.entries(DISTRICT_DATA).forEach(([did, d]) => {
  const li = document.createElement("li");
  li.innerHTML = `<strong>${d.name}</strong><br><span class="npc">${d.tone}</span>`;
  li.onclick = () => showDistrict(did);
  dlist.appendChild(li);
});

// ---- Search ----
const search = document.getElementById("search");
const results = document.getElementById("search-results");
search.addEventListener("input", () => {
  const q = search.value.trim().toLowerCase();
  if (!q) { results.innerHTML = ""; return; }
  const matches = [];
  for (const [id, p] of Object.entries(POI_DATA)) {
    if (p.name.toLowerCase().includes(q) || (p.npc && p.npc.toLowerCase().includes(q))) {
      matches.push({kind:"poi", id, label:p.name, sub:p.npc||""});
    }
  }
  for (const [id, d] of Object.entries(DISTRICT_DATA)) {
    if (d.name.toLowerCase().includes(q)) {
      matches.push({kind:"district", id, label:d.name, sub:""});
    }
  }
  results.innerHTML = matches.length === 0 ? '<p style="color:var(--ink-dim);font-size:13px;">No matches.</p>' :
    `<ul class="poi-list">${matches.slice(0,12).map(m =>
      `<li onclick="show${m.kind==='poi'?'POI':'District'}('${m.id}')">${m.label}${m.sub?`<br><span class="npc">${m.sub}</span>`:''}</li>`
    ).join("")}</ul>`;
});

// ---- Pan & zoom ----
const vb = svg.viewBox.baseVal;
let viewport = {x: vb.x, y: vb.y, w: vb.width, h: vb.height};
const VB_W = vb.width, VB_H = vb.height;
function applyVB() { svg.setAttribute("viewBox", `${viewport.x} ${viewport.y} ${viewport.w} ${viewport.h}`); }

let dragging = false, dragStart = null;
svg.addEventListener("mousedown", (e) => {
  if (e.target.closest(".poi, .district")) return;
  dragging = true; dragStart = {x: e.clientX, y: e.clientY, vx: viewport.x, vy: viewport.y};
  svg.classList.add("dragging");
});
window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const r = svg.getBoundingClientRect();
  const sx = viewport.w / r.width;
  const sy = viewport.h / r.height;
  viewport.x = dragStart.vx - (e.clientX - dragStart.x) * sx;
  viewport.y = dragStart.vy - (e.clientY - dragStart.y) * sy;
  applyVB();
});
window.addEventListener("mouseup", () => { dragging = false; svg.classList.remove("dragging"); });

svg.addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.15 : 1/1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, {passive:false});

function zoomAt(cx, cy, factor) {
  const r = svg.getBoundingClientRect();
  const px = (cx - r.left) / r.width;
  const py = (cy - r.top) / r.height;
  const wx = viewport.x + px * viewport.w;
  const wy = viewport.y + py * viewport.h;
  let nw = viewport.w * factor;
  let nh = viewport.h * factor;
  nw = Math.max(VB_W * 0.15, Math.min(VB_W * 2, nw));
  nh = Math.max(VB_H * 0.15, Math.min(VB_H * 2, nh));
  viewport.w = nw; viewport.h = nh;
  viewport.x = wx - px * nw;
  viewport.y = wy - py * nh;
  applyVB();
}

document.getElementById("zoom-in").onclick = () => {
  const r = svg.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 1/1.3);
};
document.getElementById("zoom-out").onclick = () => {
  const r = svg.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 1.3);
};
document.getElementById("zoom-reset").onclick = () => {
  viewport = {x:0, y:0, w:VB_W, h:VB_H}; applyVB();
};
</script>
</body>
